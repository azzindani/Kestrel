[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
warn_return_any = false
no_implicit_optional = true
disallow_untyped_defs = false
exclude = [
    "src/engine/",
    "src/data/",
    "src/db/",
    "src/notify/",
    "src/viz/",
    "src/execution/live\\.py",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = ["--tb=short", "-q"]

[tool.coverage.run]
source = ["src"]
omit = [
    "src/db/*",
    "src/engine/*",
    "src/data/*",
    "src/notify/*",
    "src/viz/*",
    "src/execution/live.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
fail_under = 85
